<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .tableau-container {
            width: 1366px;
            height: 768px;
        }
    </style>
    <script type="text/javascript" src="https://public.tableau.com/javascripts/api/tableau-2.min.js"></script>
</head>
<body>
    <div class="tableau-container" id="tableauViz"></div>

    <script type="text/javascript">
        function initViz() {
            var containerDiv = document.getElementById("tableauViz");
            var url = "https://public.tableau.com/views/BFG_17257187276320/Main";
            var options = {
                width: "1366px",
                height: "768px",
                hideTabs: true,
                hideToolbar: true,
                onFirstInteractive: function () {
                    // This function will be called once the viz is interactive
                    console.log("Viz is now interactive");
                    hideToolbar();
                }
            };
            var viz = new tableau.Viz(containerDiv, url, options);
        }

        function hideToolbar() {
            // Function to hide the toolbar
            var style = document.createElement('style');
            style.textContent = 'div#viz-viewer-toolbar { display: none !important; }';
            document.head.appendChild(style);

            // Additional attempt to hide the toolbar using JavaScript
            var toolbar = document.getElementById('viz-viewer-toolbar');
            if (toolbar) {
                toolbar.style.display = 'none';
            }

            console.log("Attempted to hide toolbar");
        }

        // Initialize the viz when the page has finished loading
        document.addEventListener("DOMContentLoaded", initViz);

        // Additional attempt to hide toolbar after a delay
        setTimeout(hideToolbar, 2000);
    </script>
</body>
</html>

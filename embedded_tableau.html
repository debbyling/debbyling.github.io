<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }
        .tableau-container {
            width: 1366px;
            height: 768px;
            position: relative;
            display: none; /* Hide the dashboard container initially */
        }
        #login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        #login-form {
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        #login-form input {
            display: block;
            margin: 10px 0;
            padding: 10px;
            width: 250px;
            border: 1px solid #ddd;
            border-radius: 3px;
        }
        #login-form button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #login-form button:hover {
            background-color: #0056b3;
        }
        #error-message {
            color: red;
            margin-top: 10px;
        }
    </style>
    <script type="text/javascript" src="https://public.tableau.com/javascripts/api/tableau-2.min.js"></script>
</head>
<body>
    <div class="tableau-container" id="tableauViz"></div>
    <div id="login-overlay">
        <form id="login-form">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div id="error-message"></div>
        </form>
    </div>

    <script type="text/javascript">
        let viz;

        function initViz() {
            var containerDiv = document.getElementById("tableauViz");
            var url = "https://public.tableau.com/views/BFG_17257187276320/Main";
            var options = {
                width: "1366px",
                height: "768px",
                hideTabs: true,
                hideToolbar: true,
                onFirstInteractive: function () {
                    console.log("Viz is now interactive");
                    hideToolbar();
                }
            };
            viz = new tableau.Viz(containerDiv, url, options);
        }

        function hideToolbar() {
            var style = document.createElement('style');
            style.textContent = 'div#viz-viewer-toolbar { display: none !important; }';
            document.head.appendChild(style);

            var toolbar = document.getElementById('viz-viewer-toolbar');
            if (toolbar) {
                toolbar.style.display = 'none';
            }

            console.log("Attempted to hide toolbar");
        }

        document.addEventListener("DOMContentLoaded", function() {
            document.getElementById('login-form').addEventListener('submit', function(e) {
                e.preventDefault();
                var username = document.getElementById('username').value;
                var password = document.getElementById('password').value;
                
                if (username === 'admin' && password === 'HeartHackers') {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.querySelector('.tableau-container').style.display = 'block';
                    initViz(); // Initialize the dashboard only after successful login
                } else {
                    document.getElementById('error-message').textContent = 'Invalid credentials. Please try again.';
                }
            });
        });
    </script>
</body>
</html>
